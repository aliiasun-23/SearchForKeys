<script>
// ===================== ASSET LOADER =====================
const images = {};
function loadImages(callback) {
    let loaded = 0;
    const keys = Object.keys(ASSETS_B64);
    keys.forEach(name => {
        const img = new Image();
        img.onload = () => { loaded++; if (loaded === keys.length) callback(); };
        img.src = ASSETS_B64[name];
        images[name] = img;
    });
}

// ===================== CANVAS =====================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1000;
canvas.height = 600;

// ===================== GAME STATE =====================
let gameState = 'title';
let lives = 3;
let totalCoins = 0;
let levelCoins = 0;
let currentLevel = 0;
let hurtTimer = 0;
let stateTimer = 0;
let invincibleTimer = 0;

// Stars for space backgrounds
const stars = Array.from({length:200}, () => ({
    x: Math.random()*1000, y: Math.random()*600,
    r: Math.random()*1.8+0.3, speed: Math.random()*0.4+0.1,
    twinkle: Math.random()*Math.PI*2
}));
const titleKeys = [
    {x:270, y:310, color:'blue', angle:0},
    {x:430, y:280, color:'green', angle:0},
    {x:590, y:310, color:'yellow', angle:0},
    {x:730, y:280, color:'red', angle:0},
];

// Confetti
let confetti = [];
function spawnConfetti() {
    confetti = Array.from({length:140}, () => ({
        x: Math.random()*1000, y: -20 - Math.random()*200,
        vx: (Math.random()-0.5)*3, vy: Math.random()*3+1.5,
        size: Math.random()*10+5, rot: Math.random()*Math.PI*2,
        rotSpeed: (Math.random()-0.5)*0.15,
        color: `hsl(${Math.floor(Math.random()*360)},90%,60%)`,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
    }));
}

// ===================== PLAYER =====================
const player = {
    x:50, y:400, w:64, h:92,
    speed:4.5, dx:0, dy:0,
    jumping:false, facingRight:true,
    walkFrame:0, walkTimer:0, state:'stand'
};
const gravity = 0.58;
const keysDown = {};

document.addEventListener("keydown", e => {
    keysDown[e.key] = true;
    if (gameState==='title' && (e.key==='Enter'||e.key===' ')) startGame();
    if (gameState==='levelclear' && stateTimer>80 && (e.key==='Enter'||e.key===' ')) nextLevel();
    if (gameState==='victory' && stateTimer>80 && (e.key==='Enter'||e.key===' ')) { location.reload(); }
    if (gameState==='gameover' && stateTimer>80 && (e.key==='Enter'||e.key===' ')) { location.reload(); }
    if (gameState==='playing') {
        if ((e.key==="ArrowUp"||e.key==="w") && !player.jumping) {
            player.dy = -14; player.jumping = true;
        }
    }
});
document.addEventListener("keyup", e => { keysDown[e.key] = false; });
canvas.addEventListener('click', () => {
    if (gameState==='title') startGame();
    if (gameState==='levelclear' && stateTimer>80) nextLevel();
    if (gameState==='victory' && stateTimer>80) location.reload();
    if (gameState==='gameover' && stateTimer>80) location.reload();
});

// ===================== LEVEL THEMES =====================
// Each level has a theme that changes how it's drawn
const THEMES = {
    space:  { sky1:'#02001a', sky2:'#0a0035', groundColor:'#3a0a6a', platformColor:'#5a1a9a', platformTop:'#8b40cc', coinColor:'#ffe066', name:'🪐 Космос' },
    forest: { sky1:'#1a3a0a', sky2:'#2a5a10', groundColor:'#3a1a00', platformColor:'#5a3010', platformTop:'#4aaa20', coinColor:'#ffd700', name:'🌲 Лес' },

let levels = makeLevels();

// ===================== STATE TRANSITIONS =====================
function startGame() {
    levels = makeLevels();
    lives = 3; currentLevel = 0; totalCoins = 0; levelCoins = 0;
    resetPlayer();
    gameState = 'playing';
}

function nextLevel() {
    totalCoins += levelCoins;
    currentLevel++;
    if (currentLevel >= levels.length) {
        stateTimer = 0;
        gameState = 'victory';
        spawnConfetti();
    } else {
        levelCoins = 0;
        resetPlayer();
        gameState = 'playing';
        stateTimer = 0;
    }
}

function resetPlayer() {
    const lvl = levels[currentLevel];
    player.x = lvl.playerStart.x; player.y = lvl.playerStart.y;
    player.dx=0; player.dy=0; player.jumping=false; hurtTimer=0; invincibleTimer=0;
}

function loseLife() {
    if (hurtTimer>0 || invincibleTimer>0) return;
    lives--;
    hurtTimer = 90;
    invincibleTimer = 90;
    player.state = 'hurt';
    if (lives<=0) {
        stateTimer = 0;
        gameState = 'gameover';
    } else {
        setTimeout(resetPlayer, 500);
    }
}

// ===================== ICY PHYSICS =====================
let iceSlide = 0;

// ===================== UPDATE =====================
function update() {
    stateTimer++;
    if (gameState==='title') { titleKeys.forEach(k => { k.angle += 0.012; }); return; }
    if (gameState==='levelclear'||gameState==='victory'||gameState==='gameover') {
        confetti.forEach(c => {
            c.x+=c.vx; c.y+=c.vy; c.rot+=c.rotSpeed;
            if (c.y>640) { c.y=-20; c.x=Math.random()*1000; }
        });
        return;
    }

    if (hurtTimer>0) { hurtTimer--; if(invincibleTimer>0) invincibleTimer--; return; }
    if (invincibleTimer>0) invincibleTimer--;

    const level = levels[currentLevel];
    const isIcy = level.theme === 'ice';

    // Movement
    const moving = keysDown["ArrowLeft"]||keysDown["a"]||keysDown["ArrowRight"]||keysDown["d"];
    if (isIcy) {
        // Slippery — build up slide momentum
        if (keysDown["ArrowLeft"]||keysDown["a"]) { iceSlide = Math.max(iceSlide-0.4, -player.speed*1.2); player.facingRight=false; }
        else if (keysDown["ArrowRight"]||keysDown["d"]) { iceSlide = Math.min(iceSlide+0.4, player.speed*1.2); player.facingRight=true; }
        else { iceSlide *= 0.97; } // slow deceleration on ice
        player.x += iceSlide;
    } else {
        iceSlide = 0;
        if (keysDown["ArrowLeft"]||keysDown["a"]) { player.x -= player.speed; player.facingRight=false; }
        else if (keysDown["ArrowRight"]||keysDown["d"]) { player.x += player.speed; player.facingRight=true; }
    }

    // Walk animation
    if (!player.jumping) {
        if (moving) {
            player.state='walk';
            player.walkTimer++;
            if (player.walkTimer>=5) { player.walkTimer=0; player.walkFrame=(player.walkFrame+1)%11; }
        } else { player.state='stand'; }
    } else { player.state='jump'; }

    // Gravity
    player.dy += gravity; player.y += player.dy; player.jumping=true;

    // Platform collision
    level.platforms.forEach(p => {
        if (player.x < p.x+p.w && player.x+player.w > p.x &&
            player.y+player.h > p.y && player.y+player.h < p.y+32 && player.dy>=0) {
            player.y = p.y-player.h; player.dy=0; player.jumping=false;
        }
    });

    // Clamp to canvas
    player.x = Math.max(0, Math.min(canvas.width-player.w, player.x));

    // Fall death
    if (player.y > canvas.height+50) loseLife();

    // Key collection
    level.keys.forEach(k => {
        if (!k.collected && player.x < k.x+36 && player.x+player.w > k.x &&
            player.y < k.y+52 && player.y+player.h > k.y) {
            k.collected=true; level.keysCollected++;
        }
    });

    // Coin collection
    level.coins.forEach(c => {
        if (!c.collected &&
            player.x < c.x+20 && player.x+player.w > c.x &&
            player.y < c.y+20 && player.y+player.h > c.y) {
            c.collected=true; levelCoins++;
        }
    });

    // Enemy update & collision
    level.enemies.forEach(enemy => {
        const speed = enemy.speed;
        // Bat floats up-down
        if (enemy.type==='bat') {
            enemy.floatY = (enemy.floatY||0) + 0.07;
            enemy.y = enemy._baseY + Math.sin(enemy.floatY)*20;
            if (enemy._baseY === undefined) enemy._baseY = enemy.y;
        }
        enemy.x += enemy.dir * speed;
        if (enemy.x <= enemy.range.min || enemy.x >= enemy.range.max) enemy.dir *= -1;
        enemy.frameTimer++;
        if (enemy.frameTimer >= (enemy.type==='bat'?8:15)) { enemy.frameTimer=0; enemy.frame=1-enemy.frame; }

        // Collision
        if (invincibleTimer===0 &&
            player.x < enemy.x+enemy.w && player.x+player.w > enemy.x &&
            player.y < enemy.y+enemy.h && player.y+player.h > enemy.y) {
            loseLife();
        }
    });

    // Exit
    const ex = level.exit;
    if (level.keysCollected===3 &&
        player.x < ex.x+72 && player.x+player.w > ex.x &&
        player.y < ex.y+86 && player.y+player.h > ex.y) {
        stateTimer = 0;
        gameState = 'levelclear';
        spawnConfetti();
    }
}

// ===================== HELPER FUNCTIONS =====================
function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function drawStarfield(t) {
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#02001a'); grad.addColorStop(1,'#0a0035');
    ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
    stars.forEach(s => {
        const twinkle = 0.5+0.5*Math.sin(t*0.04+s.twinkle);
        ctx.globalAlpha=twinkle; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
    [[300,180,'#3a006f'],[700,350,'#001f6f'],[500,420,'#6f0040']].forEach(([nx,ny,nc])=>{
        const g2=ctx.createRadialGradient(nx,ny,10,nx,ny,180);
        g2.addColorStop(0,nc+'88'); g2.addColorStop(1,'transparent');
        ctx.fillStyle=g2; ctx.fillRect(0,0,canvas.width,canvas.height);
    });
}

function drawForestBg() {
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#1a4a05'); grad.addColorStop(0.6,'#2a6010'); grad.addColorStop(1,'#1a3a08');
    ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
    // Trees in background
    ctx.fillStyle='rgba(10,40,5,0.5)';
    [80,200,350,500,640,780,900].forEach((tx,i)=>{
        const th = 150+i*20;
        ctx.beginPath();
        ctx.moveTo(tx,canvas.height-60);
        ctx.lineTo(tx-40,canvas.height-60-th*0.6);
        ctx.lineTo(tx-20,canvas.height-60-th*0.5);
        ctx.lineTo(tx-25,canvas.height-60-th);
        ctx.lineTo(tx+25,canvas.height-60-th);
        ctx.lineTo(tx+20,canvas.height-60-th*0.5);
        ctx.lineTo(tx+40,canvas.height-60-th*0.6);
        ctx.closePath(); ctx.fill();
    });
}

function drawIceBg() {

function drawCandyBg() {

function drawCastleBg() {

function drawBackground(level) {
    switch(level.bgStyle) {
        case 'space':    drawStarfield(stateTimer); break;
        case 'forest':   drawForestBg(); break;
        case 'ice':      drawIceBg(); break;
        case 'candy':    drawCandyBg(); break;
        case 'mushroom': drawMushroomBg(); break;
        case 'castle':   drawCastleBg(); break;
        default:         drawStarfield(stateTimer);

function drawPlatform(p, theme) {
    const t = THEMES[theme] || THEMES.space;
    ctx.fillStyle = t.platformColor;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // Draw top tile strip
    if (p.type === 'ground') {
        try { ctx.drawImage(images['grassLeft.png'],  p.x, p.y-6, 70, 70); } catch(e){}
        for(let tx=p.x+70; tx<p.x+p.w-70; tx+=70) {
            try { ctx.drawImage(images['grassMid.png'], tx, p.y-6, 70, 70); } catch(e){}
        }
        try { ctx.drawImage(images['grassRight.png'], p.x+p.w-70, p.y-6, 70, 70); } catch(e){}
    } else {
        // Platform top highlight
        ctx.fillStyle = theme==='ice' ? 'rgba(200,240,255,0.9)' :
                        theme==='candy' ? 'rgba(255,180,220,0.9)' :
                        theme==='castle' ? 'rgba(160,160,160,0.9)' :
                        t.platformTop;
        ctx.fillRect(p.x, p.y, p.w, 4);
        // Ice shimmer
        if (theme==='ice') {
            ctx.fillStyle='rgba(255,255,255,0.3)';
            ctx.fillRect(p.x+5,p.y+1,p.w-10,2);
        }
    }
}

function drawKey(k) {
    if (k.collected) return;
    const km={blue:'keyBlue.png',green:'keyGreen.png',red:'keyRed.png',yellow:'keyYellow.png'};
    const bob = Math.sin(stateTimer*0.07)*4;

    ctx.save();
    const col = {blue:'#4488ff',green:'#44ff88',red:'#ff4444',yellow:'#ffee44'}[k.color]||'#fff';
    ctx.shadowColor=col; ctx.shadowBlur=14;
    ctx.drawImage(images[km[k.color]], k.x, k.y+bob, 36, 52);
    ctx.restore();
}

function drawCoin(c) {
    if (c.collected) return;
    const bob = Math.sin(stateTimer*0.1)*3;
    ctx.save();
    ctx.shadowColor='#ffe066'; ctx.shadowBlur=10;
    ctx.fillStyle='#ffe066';
    ctx.beginPath(); ctx.arc(c.x+10, c.y+10+bob, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#cc9900'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(c.x+10, c.y+10+bob, 8, 0, Math.PI*2); ctx.stroke();

    ctx.fillStyle='rgba(255,255,200,0.5)';

function drawExit(ex, open) {
    try {
        const img = open ? images['door_openMid.png'] : images['door_openMid.png'];
        ctx.save();
        if (!open) { ctx.globalAlpha=0.45; ctx.filter='grayscale(80%)'; }
        else {
            ctx.shadowColor='#ffe066'; ctx.shadowBlur=30;
        }
        ctx.drawImage(images['door_openTop.png'], ex.x, ex.y-46, 72, 52);
        ctx.drawImage(images['door_openMid.png'], ex.x, ex.y, 72, 86);
        ctx.restore();
        if (!open) {
            ctx.save(); ctx.fillStyle='rgba(80,80,80,0.6)';
            ctx.beginPath(); roundRect(ctx, ex.x, ex.y-46, 72, 132, 4); ctx.fill();
            ctx.restore();
            ctx.fillStyle='rgba(200,150,50,0.9)'; ctx.font='bold 12px Arial';

        // Fallback door
        ctx.fillStyle = open ? '#ffe066' : '#555';
        ctx.fillRect(ex.x, ex.y-46, 72, 132);
    }

function drawEnemy(e) {
    ctx.save();
    if (e.type === 'bat') {
        // Draw bat as colored shape
        const wingFlap = e.frame===0 ? -10 : 10;
        ctx.fillStyle='#bb44ff';
        ctx.shadowColor='#880088'; ctx.shadowBlur=8;
        // Body
        ctx.beginPath(); ctx.ellipse(e.x+20, e.y+14, 10, 8, 0, 0, Math.PI*2); ctx.fill();
        // Wings
        ctx.beginPath();
        ctx.moveTo(e.x+10,e.y+14);
        ctx.quadraticCurveTo(e.x-5, e.y+14+wingFlap, e.x, e.y+24);
        ctx.quadraticCurveTo(e.x+5,e.y+16,e.x+10,e.y+14);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(e.x+30,e.y+14);
        ctx.quadraticCurveTo(e.x+45, e.y+14+wingFlap, e.x+40, e.y+24);
        ctx.quadraticCurveTo(e.x+35,e.y+16,e.x+30,e.y+14);
        ctx.closePath(); ctx.fill();
        // Eyes
        ctx.fillStyle='#ff2222'; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.arc(e.x+15,e.y+12,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.x+25,e.y+12,3,0,Math.PI*2); ctx.fill();
    } else if (e.type === 'spike') {
        // Spike enemy - spiky ball
        ctx.fillStyle='#ff6600'; ctx.shadowColor='#ff4400'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(e.x+22,e.y+15,14,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ff3300';
        for(let i=0;i<8;i++){
            const a=i/8*Math.PI*2+stateTimer*0.05;
            ctx.beginPath();
            ctx.moveTo(e.x+22+Math.cos(a)*14, e.y+15+Math.sin(a)*14);
            ctx.lineTo(e.x+22+Math.cos(a)*22, e.y+15+Math.sin(a)*22);
            ctx.lineTo(e.x+22+Math.cos(a+0.2)*16, e.y+15+Math.sin(a+0.2)*16);
            ctx.closePath(); ctx.fill();
        }
        ctx.fillStyle='#ffee00';
        ctx.beginPath(); ctx.arc(e.x+17,e.y+12,3,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e.x+27,e.y+12,3,0,Math.PI*2); ctx.fill();
    } else {
        // Slime
        const slimeImg = e.frame===0 ? images['slimeWalk1.png'] : images['slimeWalk2.png'];
        if(e.dir===-1){
            ctx.translate(e.x+e.w,0); ctx.scale(-1,1);
            ctx.drawImage(slimeImg,0,e.y,e.w,e.h);
        } else {
            ctx.drawImage(slimeImg,e.x,e.y,e.w,e.h);
        }
    }
    ctx.restore();
}

function drawPlayer() {
    const lvl = levels[currentLevel];
    const tint = lvl.playerTint;
    const walkFrames=['p1_walk01.png','p1_walk02.png','p1_walk03.png','p1_walk04.png',
                      'p1_walk05.png','p1_walk06.png','p1_walk07.png','p1_walk08.png',
                      'p1_walk09.png','p1_walk10.png','p1_walk11.png'];
    let img;
    if(player.state==='hurt') img=images['p1_hurt.png'];
    else if(player.state==='jump') img=images['p1_jump.png'];
    else if(player.state==='walk') img=images[walkFrames[player.walkFrame]];
    else img=images['p1_stand.png'];

    ctx.save();
    // Hurt flash
    if(hurtTimer>0 && Math.floor(hurtTimer/5)%2===0){ ctx.globalAlpha=0.4; }
    // Invincible shimmer
    else if(invincibleTimer>0){ ctx.globalAlpha=0.7+0.3*Math.sin(invincibleTimer*0.3); }

    if(!player.facingRight){
        ctx.translate(player.x+player.w,0); ctx.scale(-1,1);
        if(tint) { ctx.filter=`hue-rotate(${tintToHue(tint)}deg) saturate(1.5)`; }
        ctx.drawImage(img,0,player.y,player.w,player.h);
    } else {
        if(tint) { ctx.filter=`hue-rotate(${tintToHue(tint)}deg) saturate(1.5)`; }
        ctx.drawImage(img,player.x,player.y,player.w,player.h);
    }
    ctx.restore();
}

function tintToHue(hex) {
    if(!hex) return 0;
    // Map hex color to hue rotation degrees
    const map={'#00cc44':120,'#55aaff':200,'#ff44aa':300,'#ffaa00':35,'#ff4444':0};
    return map[hex]||0;
}

    ctx.fillText(`Уровень ${currentLevel+1}/6`, 632, 30);

    ctx.strokeStyle='rgba(200,160,255,0.3)'; ctx.lineWidth=1.5;
    ctx.beginPath(); roundRect(ctx,480,395,420,110,14); ctx.stroke();
    ctx.font='bold 14px Arial'; ctx.fillStyle='#ffe066';
    ctx.fillText('6 уровней:', 690, 418);
    ctx.font='13px Arial'; ctx.fillStyle='#d4b8ff';
    ['🪐 Космос','🌲 Лес','❄️ Лёд','🍬 Конфеты','🍄 Грибы','🏰 Замок'].forEach((name,i)=>{
        ctx.fillText(name, i<3?490:700, 438+((i%3)*22));
    });

    // Start button
    const pulse=0.85+0.15*Math.sin(t*0.1);
    ctx.save(); ctx.globalAlpha=pulse;
    ctx.fillStyle='#7b2fff';
    ctx.beginPath(); roundRect(ctx,360,530,280,52,26); ctx.fill();
    ctx.globalAlpha=1;
    ctx.strokeStyle='#c9a9ff'; ctx.lineWidth=2;
    ctx.beginPath(); roundRect(ctx,360,530,280,52,26); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 22px Arial';
    ctx.fillText('▶  НАЧАТЬ ИГРУ', 500, 562);
    ctx.restore();
    ctx.textAlign='left';
}

// ===================== LEVEL CLEAR SCREEN =====================
function drawLevelClearScreen() {
    const level = levels[Math.min(currentLevel, levels.length-1)];
    drawBackground(level);
    ctx.fillStyle='rgba(0,0,30,0.72)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drawConfettiDraw();

    const t=stateTimer, slide=Math.min(1,t/40), panelY=120-(1-slide)*300;
    ctx.fillStyle='rgba(20,10,60,0.93)';
    ctx.beginPath(); roundRect(ctx,200,panelY,600,340,24); ctx.fill();
    const borderGrad=ctx.createLinearGradient(200,panelY,800,panelY+340);
    borderGrad.addColorStop(0,'#ffe066'); borderGrad.addColorStop(0.5,'#ff9f1c'); borderGrad.addColorStop(1,'#ffe066');
    ctx.strokeStyle=borderGrad; ctx.lineWidth=3;
    ctx.beginPath(); roundRect(ctx,200,panelY,600,340,24); ctx.stroke();

    ctx.textAlign='center';
    ctx.font='64px Arial'; ctx.fillText('🏆',500,panelY+80);
    ctx.shadowColor='#ffe066'; ctx.shadowBlur=30;
    ctx.font='bold 44px "Trebuchet MS",Arial'; ctx.fillStyle='#ffe066';
    ctx.fillText('УРОВЕНЬ ПРОЙДЕН!',500,panelY+140);
    ctx.shadowBlur=0;
    ctx.font='20px Arial'; ctx.fillStyle='#c9d4ff';
    ctx.fillText(`Уровень ${currentLevel+1} — ${THEMES[level.theme].name} завершён`,500,panelY+175);

    // Coins earned
    ctx.font='18px Arial'; ctx.fillStyle='#ffe066';
    ctx.fillText(`🪙 Монет на уровне: ${levelCoins}   Всего: ${totalCoins+levelCoins}`, 500, panelY+205);

    // Keys display
    const km={blue:'keyBlue.png',green:'keyGreen.png',red:'keyRed.png',yellow:'keyYellow.png'};
    level.keys.forEach((k,i)=>{
        const kx=370+i*90;
        ctx.drawImage(images[km[k.color]],kx,panelY+220,32,46);
        ctx.font='16px Arial'; ctx.fillStyle='#7eff8b';
        ctx.fillText('✓',kx+38,panelY+248);
    });

    if(t>80){
        const pulse=0.8+0.2*Math.sin(t*0.12);
        ctx.save(); ctx.globalAlpha=pulse;
        ctx.fillStyle=currentLevel+1<levels.length?'#1a7a3f':'#7b2fff';
        ctx.beginPath(); roundRect(ctx,330,panelY+285,340,50,25); ctx.fill();
        ctx.globalAlpha=1;
        ctx.strokeStyle='#aaffcc'; ctx.lineWidth=1.5;
        ctx.beginPath(); roundRect(ctx,330,panelY+285,340,50,25); ctx.stroke();
        ctx.font='bold 19px Arial'; ctx.fillStyle='#fff';
        ctx.fillText(currentLevel+1<levels.length?'▶  СЛЕДУЮЩИЙ УРОВЕНЬ':'🏆  К ФИНАЛУ',500,panelY+316);
        ctx.restore();
    }
    ctx.textAlign='left';
}

// ===================== VICTORY SCREEN =====================
function drawVictoryScreen() {
    drawStarfield(stateTimer);
    drawConfettiDraw();
    const t=stateTimer, slide=Math.min(1,t/50), panelY=50-(1-slide)*300;
    ctx.fillStyle='rgba(10,5,40,0.93)';
    ctx.beginPath(); roundRect(ctx,130,panelY,740,460,28); ctx.fill();
    const vGrad=ctx.createLinearGradient(130,panelY,870,panelY+460);
    vGrad.addColorStop(0,'#ffe066'); vGrad.addColorStop(0.33,'#ff9f1c');
    vGrad.addColorStop(0.66,'#e040fb'); vGrad.addColorStop(1,'#ffe066');
    ctx.strokeStyle=vGrad; ctx.lineWidth=3;
    ctx.beginPath(); roundRect(ctx,130,panelY,740,460,28); ctx.stroke();

    ctx.textAlign='center';
    ctx.font='72px Arial'; ctx.fillText('🎉',500,panelY+90);
    ctx.shadowColor='#ffe066'; ctx.shadowBlur=40;
    ctx.font='bold 50px "Trebuchet MS"'; ctx.fillStyle='#ffe066';
    ctx.fillText('ПОЗДРАВЛЯЕМ!',500,panelY+165);
    ctx.shadowBlur=0;
    ctx.font='24px Arial'; ctx.fillStyle='#c9d4ff';
    ctx.fillText('Вы прошли все 6 уровней!',500,panelY+210);
    ctx.font='22px Arial'; ctx.fillStyle='#aaffc4';
    ctx.fillText(`Осталось жизней: ${'❤️'.repeat(lives)}`,500,panelY+250);
    ctx.font='bold 24px Arial'; ctx.fillStyle='#ffe066';
    ctx.fillText(`🪙 Всего монет: ${totalCoins+levelCoins}`,500,panelY+290);

    // All level icons
    ctx.font='22px Arial'; ctx.fillStyle='#c9d4ff';
    ['🪐','🌲','❄️','🍬','🍄','🏰'].forEach((icon,i)=>{
        ctx.fillText(icon,225+i*90,panelY+330);
    });
    ctx.font='14px Arial'; ctx.fillStyle='#aaa';
    ctx.fillText('Все уровни пройдены!',500,panelY+365);

    if(t>80){
        const pulse=0.82+0.18*Math.sin(t*0.12);
        ctx.save(); ctx.globalAlpha=pulse;
        ctx.fillStyle='#7b2fff';
        ctx.beginPath(); roundRect(ctx,330,panelY+390,340,52,26); ctx.fill();
        ctx.globalAlpha=1;
        ctx.strokeStyle='#e040fb'; ctx.lineWidth=2;
        ctx.beginPath(); roundRect(ctx,330,panelY+390,340,52,26); ctx.stroke();
        ctx.font='bold 20px Arial'; ctx.fillStyle='#fff';
        ctx.fillText('↩  ИГРАТЬ СНОВА',500,panelY+422);
        ctx.restore();
    }
    ctx.textAlign='left';
}

// ===================== GAME OVER SCREEN =====================
function drawGameOverScreen() {
    drawStarfield(stateTimer);
    const t=stateTimer, slide=Math.min(1,t/45), panelY=150-(1-slide)*300;
    ctx.fillStyle='rgba(40,0,0,0.93)';
    ctx.beginPath(); roundRect(ctx,220,panelY,560,300,24); ctx.fill();
    ctx.strokeStyle='#cc2222'; ctx.lineWidth=3;
    ctx.beginPath(); roundRect(ctx,220,panelY,560,300,24); ctx.stroke();

    ctx.textAlign='center';
    ctx.font='64px Arial'; ctx.fillText('💀',500,panelY+80);
    ctx.shadowColor='#ff4444'; ctx.shadowBlur=30;
    ctx.font='bold 48px "Trebuchet MS"'; ctx.fillStyle='#ff4444';
    ctx.fillText('ИГРА ОКОНЧЕНА',500,panelY+140);
    ctx.shadowBlur=0;
    ctx.font='18px Arial'; ctx.fillStyle='#ffaaaa';
    ctx.fillText(`Монет собрано: ${totalCoins+levelCoins}`,500,panelY+180);
    ctx.fillText('Враги тебя победили...',500,panelY+210);

    if(t>80){
        const pulse=0.82+0.18*Math.sin(t*0.12);
        ctx.save(); ctx.globalAlpha=pulse;
        ctx.fillStyle='#8b0000';
        ctx.beginPath(); roundRect(ctx,340,panelY+235,320,52,26); ctx.fill();
        ctx.globalAlpha=1;
        ctx.strokeStyle='#ff6666'; ctx.lineWidth=1.5;
        ctx.beginPath(); roundRect(ctx,340,panelY+235,320,52,26); ctx.stroke();
        ctx.font='bold 20px Arial'; ctx.fillStyle='#fff';
        ctx.fillText('↩  ПОПРОБОВАТЬ СНОВА',500,panelY+267);
        ctx.restore();
    }
    ctx.textAlign='left';
}

// ===================== CONFETTI DRAW =====================
function drawConfettiDraw() {
    confetti.forEach(c=>{
        ctx.save(); ctx.globalAlpha=0.85;
        ctx.translate(c.x+c.size/2,c.y+c.size/2); ctx.rotate(c.rot);
        ctx.fillStyle=c.color;
        if(c.shape==='rect') ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*0.5);
        else { ctx.beginPath(); ctx.arc(0,0,c.size/2,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
    });
    ctx.globalAlpha=1;
}

// ===================== MAIN DRAW =====================
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(gameState==='title'){ drawTitleScreen(); return; }
    if(gameState==='levelclear'){ drawLevelClearScreen(); return; }
    if(gameState==='victory'){ drawVictoryScreen(); return; }
    if(gameState==='gameover'){ drawGameOverScreen(); return; }

    const level = levels[currentLevel];
    drawBackground(level);
    level.platforms.forEach(p=>drawPlatform(p, level.theme));
    level.coins.forEach(drawCoin);
    level.keys.forEach(drawKey);
    drawExit(level.exit, level.keysCollected===3);
    level.enemies.forEach(drawEnemy);
    drawPlayer();
    drawHUD();
}

// ===================== GAME LOOP =====================
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ===================== START =====================
loadImages(()=>{
    document.getElementById('loading').style.display='none';
    stateTimer=0;
    loop();
});
</script>
</body>
</html>
